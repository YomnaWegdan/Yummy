<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yummy</title>
    <link rel="stylesheet" href="css/bootstrap.min.css"/>
    <link rel="stylesheet" href="css/all.min.css"/>

    <!--?========> Animate.CSS <========-->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
      integrity="sha512-c42qTSw/wPZ3/5LBzD+Bw5f7bSF2oxou6wEb+I/lqeaKV5FDIfMvvRp772y4jcJLKuGUOpbJMdg/BTl50fJYAw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="css/style.css"/>
    <link rel="stylesheet" href="css/media.css"/>


</head>
<body>

    <header class="vh-100 text-white" >
        <div class="overlay h-100">  
            <div class="sidebar position-fixed  left-0 d-flex h-100 z-3">
                <div class="sidebar-box h-100">
                    
                    <ul class="group-ul  list-unstyled fs-5 h-100  ">
                        <!-- <li> <i id="close" class="fa fa-solid fa-close position-relative start-100 "></i></li> -->
                        <ul class="list list-unstyled animate__animated animate__fadeInUpBig animate__delay-1s pt-0">
                        <li><a id="searchLink" href="">Search</a> </li>
                        <li><a id="categoryLink" href="">Categories</a></li>
                        <li><a id="areaLink" href="">Area</a></li>
                        <li><a id="ingredientsLink" href="">Ingredients</a></li>
                        <li><a id="contactsLink" href="">Contacts</a></li>
                        </ul>
                        <ul class="brands-icon list-unstyled d-flex pb-5">
                            <li><i class="fa fa-brands fa-facebook-f text-white"></i></li>
                            <li><i class="fa fa-brands fa-twitter text-white"></i></li>
                            <li><i class="fa fa-solid fa-globe text-white"></i></li>

                        
                        </ul>
                      
                    </ul>
                    
                </div>


                <div class="sidebar-icons d-flex flex-column justify-content-between bg-white">
                    <div class="logo"><img src="./images/logo.png" alt="logo" class="w-100  "/></div>
                    <i id="icon" class=" fa fa-solid fa-bars fa-2x "></i>
                    <div class="d-flex flex-column" >
                        <i class="fa fa-solid fa-globe mb-2"></i>
                        <i class="fa fa-solid fa-share-nodes"></i>
                    </div>
                </div> 
            </div>

            <div id="Container" class="container py-5">
                <div class="row g-4  " id="Row">
                   
                        
                </div>
            </div>

            <section class="d-none vh-100 " id="detailSec">
                <div class="container  min-vh-100">
               
                    <div class="row h-100 g-4 text-white  align-items-center  " id="rowDetails">
                        
                       
                    </div>
                </div>
            </section>

            
            <section class="d-none min-vh-100 " id="search">
                <div class="container  min-vh-100">
               
                    <div class="row mb-5">
                        <div class="col-lg-6 col-md-12">
                            <input id="inputName" class="form-control w-75" placeholder="Search by name"/>
                        </div>
                        <div class="col-lg-6 col-md-12">
                            <input id="inputChar" class="form-control w-75" placeholder="Search by First letter"/>
                        </div>
                    </div>

                    <div class="row h-100 g-4 text-white  align-items-center  " id="Row">
     
                    </div>
                </div>
            </section>

            <section class="d-none min-vh-100 " id="categories">
                <div class="container">
                    <div class="row h-100 g-4 text-white  align-items-center" id="categorySec">
     
                    </div>
                </div>
            </section>

            <section class="d-none min-vh-100 " id="categoryMeals">
                <div class="container">
                    <div class="row h-100 g-4 text-white  align-items-center" id="categoryMealSec">
     
                    </div>
                </div>
            </section>


            <section class="d-none min-vh-100 " id="area">
                <div class="container">
                    <div class="row h-100 g-4 text-white  align-items-center" id="areaSec">
     
                    </div>
                </div>
            </section>

            <section class="d-none min-vh-100 " id="areaMeals">
                <div class="container">
                    <div class="row h-100 g-4 text-white  align-items-center" id="areaMealSec">
                    </div>
                </div>
            </section>


            <section class="d-none min-vh-100 " id="ingredients">
                <div class="container">
                    <div class="row h-100 g-4 text-white  align-items-center" id="ingredientsSec">
     
                    </div>
                </div>
            </section>

            <section class="d-none min-vh-100 " id="ingredientsMeals">
                <div class="container">
                    <div class="row h-100 g-4 text-white  align-items-center" id="ingredientsMealSec">
                    </div>
                </div>
            </section>

            <section class="d-none  "  id="contacts">
                <div class="container ">
                    <form id="form" class="row g-3 align-items-center">
                        <div class="col-md-6">
                          <input class="form-control" name="name" id="nameInput" placeholder="Enter your Name">
                          <div class="nameMassage alert alert-danger mt-2 d-none" role="alert">
                            Special characters and numbers not allowed
                          </div>
                        </div>
                       
                        <div class="col-md-6">
                          <input type="email" class="form-control" name="email" id="mailInput" placeholder="Enter your Email">
                          <div class="mailMassage alert alert-danger mt-2 d-none" role="alert">
                            Email not valid *exemple@yyy.zzz
                          </div>
                        </div>
                        <div class="col-md-6">
                            <input type="tel" class="form-control" name="phone" id="phoneInput" placeholder="Enter your Phone">
                            <div class="phoneMassage alert alert-danger mt-2 d-none" role="alert">
                                Enter valid Phone Number
                              </div>
                          </div>
                          <div class="col-md-6">
                            <input type="number" class="form-control" name="age" id="ageInput" placeholder="Enter your Age">
                            <div class="ageMassage alert alert-danger mt-2 d-none" role="alert">
                                Enter valid age
                              </div>
                          </div>
                          <div class="col-md-6">
                            <input type="password" class="form-control" name="password" id="passwordInput" placeholder="Enter your Password">
                            <div class="passwordMassage alert alert-danger mt-2 d-none" role="alert">
                                Enter valid password *Minimum eight characters, at least one letter and one number:*
                              </div>
                          </div>
                          <div class="col-md-6">
                            <input type="password" class="form-control" name="repassword" id="repasswordInput" placeholder=" Repassword">
                            <div class="repasswordMassage alert alert-danger mt-2 d-none" role="alert">
                                Enter valid rePassword                              
                            </div>
                          </div>
                          <div class="col-md-12 d-flex justify-content-center">
                            <button type="submit" class="btn btn-outline-danger" disabled >Submit</button>
                            </div>


                        </form>
                </div>
               

            </section>


            



    <div class="loading position-fixed top-0 start-0 w-100 h-100 bg-black z-3 d-flex align-items-center justify-content-center" >
        <span class="loader"></span>
    </div>

    
  

    <script src="./js/jquery-3.7.1.min.js"></script>
    <script src="./js/bootstrap.bundle.min.js"></script>
    <script src="./js/index.js" type="module"></script>
</body>
</html>
